<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أناقة الأسرة | دليل التواصل السريع</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root{
      --navy:#13354a;
      --navy-dark:#0d2736;
      --gold:#c8a75a;
      --gold-soft:#e5d4a7;
      --bg:#f6f2e8;
      --card:#ffffff;
      --text:#23455b;
      --muted:#71808b;
      --line:#e7dfcf;
      --shadow:0 18px 40px rgba(19,53,74,.10);
    }

    body{
      min-height:100vh;
      font-family:"Noto Naskh Arabic", serif;
      background:
        radial-gradient(circle at top right, rgba(200,167,90,.20), transparent 24%),
        radial-gradient(circle at top left, rgba(19,53,74,.09), transparent 26%),
        linear-gradient(180deg, #fbf8f2 0%, #f6f2e8 45%, #faf7f1 100%);
      color:var(--text);
      padding:16px;
    }

    .screen{
      max-width:470px;
      margin:0 auto;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(200,167,90,.22);
      border-radius:34px;
      overflow:hidden;
      position:relative;
      box-shadow:0 28px 60px rgba(19,53,74,.11);
      backdrop-filter: blur(8px);
    }

    .screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at right top, rgba(200,167,90,.08), transparent 18%),
        radial-gradient(circle at left 12%, rgba(19,53,74,.06), transparent 16%);
      pointer-events:none;
    }

    .inner{
      position:relative;
      z-index:1;
      padding:24px 18px 28px;
    }

    .hero{
      text-align:center;
      padding:6px 8px 18px;
    }

    .logo-wrap{
      width:190px;
      height:190px;
      margin:0 auto 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:40px;
      background:linear-gradient(180deg, #fffdfa, #f8f3e8);
      border:1px solid rgba(200,167,90,.28);
      box-shadow: var(--shadow);
      overflow:hidden;
      padding:12px;
    }

    .logo-wrap img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    h1{
      font-size:42px;
      line-height:1.2;
      font-weight:700;
      color:var(--navy);
      margin-bottom:4px;
    }

    .subtitle{
      font-size:26px;
      color:var(--gold);
      font-weight:700;
      margin-bottom:12px;
    }

    .welcome{
      max-width:360px;
      margin:0 auto;
      color:var(--muted);
      font-size:18px;
      line-height:1.95;
      font-weight:600;
    }

    .section{
      margin-top:22px;
    }

    .section-title{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:28px;
      font-weight:700;
      color:var(--navy);
      margin:6px 0 14px;
    }

    .section-title::before{
      content:"";
      width:8px;
      height:50px;
      background:linear-gradient(180deg, var(--gold), #b88f37);
      border-radius:8px;
      box-shadow:0 8px 18px rgba(200,167,90,.30);
      flex:0 0 auto;
    }

    .links{
      display:grid;
      gap:14px;
    }

    .card-link{
      text-decoration:none;
      color:inherit;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:18px 16px;
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      box-shadow:0 10px 24px rgba(19,53,74,.06);
      transition:.22s ease;
    }

    .card-link:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(19,53,74,.10);
    }

    .card-link:active{
      transform:scale(.985);
    }

    .card-link.primary{
      background:linear-gradient(135deg, #10334a 0%, #184966 100%);
      color:#fff;
      border:none;
    }

    .card-link.secondary{
      background:linear-gradient(135deg, #c29d4f 0%, #ddc06f 100%);
      color:#fff;
      border:none;
    }

    .label-wrap{
      flex:1;
      text-align:right;
    }

    .label{
      font-size:24px;
      line-height:1.45;
      font-weight:700;
    }

    .icon-box{
      width:78px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      background:rgba(255,255,255,.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .card-link:not(.primary):not(.secondary) .icon-box{
      background:#f2ede2;
      box-shadow:none;
    }

    .icon-box svg{
      width:28px;
      height:28px;
      stroke:currentColor;
      fill:none;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .footer{
      margin-top:28px;
      padding-top:18px;
      border-top:1px solid rgba(200,167,90,.28);
      text-align:center;
      color:#92753c;
      font-size:18px;
      line-height:1.9;
      font-weight:700;
    }

    @media (max-width: 420px){
      .inner{padding:20px 14px 24px}
      .logo-wrap{width:170px;height:170px}
      h1{font-size:38px}
      .subtitle{font-size:23px}
      .welcome{font-size:17px}
      .section-title{font-size:25px}
      .label{font-size:22px}
      .card-link{min-height:86px}
      .icon-box{width:72px;height:48px}
    }
  </style>
</head>
